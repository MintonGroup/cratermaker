name: cratermaker-dev
channels:
  - conda-forge
  - defaults
dependencies:
  - dask >= 2026.1.2
  - xarray >= 2026.1.0
  - uxarray >= 2025.12.0
  - distributed
  - bottleneck
  - h5netcdf
  - h5py
  - vtk >= 9.6
  - scipy
  - matplotlib
  - tqdm
  - pyogrio
  - trimesh
  - datashader >= 0.18.2
  - geoviews >= 1.15.1
  - PyYAML >= 6
  - astropy >= 7
  - pytest
  - pip >= 24.2
  - sphinx < 9
  - sphinx-autosummary-accessors
  - sphinx-book-theme >= 0.3.0
  - sphinx-copybutton
  - sphinx-design
  - sphinx-inline-tabs
  - sphinxext-rediraffe
  - sphinxext-opengraph
  - sphinx-gallery
  - ipython
  - ipykernel
  - pyvista
  - ipywidgets
  - jupyter-server-proxy
  - nest-asyncio
  - trame-client>=2.12.7
  - trame-server >= 2.11.7, != 3.7.*, != 3.8.0
  - trame-vtk<2.10.3
  - trame-vuetify>=2.3.1
  - trame>=2.5.2
  - rasterio>=1.5.0
  - craterstats >= 3.6.3
